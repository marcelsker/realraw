name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  APPIMAGE_EXTRACT_AND_RUN: 1

jobs:
  ci:
    strategy:
      matrix:
        include:
          - os: macos-latest
            label: macOS
          - os: ubuntu-latest
            label: Linux
          - os: windows-latest
            label: Windows
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install packaging tools (macOS)
        if: runner.os == 'macOS'
        run: |
          cargo install cargo-bundle
          brew install create-dmg

      - name: Install packaging tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libfuse2 || sudo apt-get install -y -qq fuse
          cargo install cargo-deb
          cargo install cargo-appimage

      - name: Build release binary
        run: cargo build --release

      - name: Run tests
        run: cargo test --release

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: ./scripts/package.sh all

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: ./scripts/package.sh all

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: ./scripts/package.sh all

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: realraw-${{ matrix.label }}
          path: |
            target/release/realraw.exe
            target/release/*.dmg
            target/debian/*.deb
            target/release/*.AppImage
            target/release/bundle/**/*.app
          compression-level: 0
          if-no-files-found: ignore
